name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject token
        run: sed -i "s|window.GITHUB_TOKEN = null|window.GITHUB_TOKEN = '${{ secrets.GH_EXPLORER_TOKEN }}'|" src/main.js
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: ''
